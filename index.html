<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Yuchen Qiu | Architect</title>
    <meta name="theme-color" content="#fbf8f2">
    <meta name="description" content="Studio Liminal — Architecture and design portfolio by Yuchen Qiu.">
    <link rel="icon" type="image/svg+xml" href="images/mark-light.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="preload" as="image" href="images/cover/spira-silva.avif" type="image/avif" fetchpriority="high">
    <link rel="preload" as="image" href="images/cover/ripple.avif" type="image/avif">
    <link rel="preload" href="vendor/gsap/gsap.min.js" as="script">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-tap-highlight-color: transparent; -webkit-text-size-adjust: 100%; }

        body {
            font-family: 'Archivo', -apple-system, sans-serif;
            background: #fbf8f2;
            color: #1a1a1a;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
        }

        .cover {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fbf8f2;
            padding-bottom: 4vh;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.18;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 512px 512px;
        }

        .logo-frame {
            position: relative;
            width: min(28vw, 260px);
            aspect-ratio: 38 / 80;
            flex-shrink: 0;
            overflow: hidden;
            /* Cross-document View Transitions: this snapshot morphs into
               .logo img on home/project pages on navigation. */
            view-transition-name: site-logo;
        }

        .logo-emboss {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .cover-slideshow {
            position: absolute;
            inset: 0;
            z-index: 2;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            will-change: opacity;
            clip-path: url(#logo-clip-inset);
            -webkit-clip-path: url(#logo-clip-inset);
        }

        .slide.active { opacity: 1; }

        /* Inner curtain wrapper — JS animates clip-path inset between slides
           to produce a curtain rise within the logo's clip shape. */
        .slide-clip {
            position: absolute;
            inset: 0;
            clip-path: inset(0);
        }

        .slide picture { display: contents; }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .slide-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.04);
            pointer-events: none;
        }

        .svg-defs {
            position: absolute;
            width: 0;
            height: 0;
            overflow: hidden;
        }

        .cover-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 3vh;
            z-index: 10;
        }

        .cover-studio {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: #1a1a1a;
            margin-bottom: 8px;
            opacity: 1;
        }

        .cover-jian {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: rgba(26, 26, 26, 0.65);
            opacity: 1;
        }

        .cover-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 5vh;
            z-index: 10;
        }

        .cover-name {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #1a1a1a;
            margin-bottom: 5px;
            opacity: 1;
        }

        .cover-tagline {
            font-size: 9px;
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(26, 26, 26, 0.65);
            margin-bottom: 28px;
            opacity: 1;
        }

        /* Editorial slide counter — replaces both indicator bars and scroll hint */
        .slide-counter {
            position: absolute;
            bottom: max(4vh, calc(env(safe-area-inset-bottom) + 2vh));
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            align-items: baseline;
            gap: 10px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.32em;
            color: rgba(26, 26, 26, 0.55);
            opacity: 1;
            font-variant-numeric: tabular-nums;
            user-select: none;
        }

        .slide-counter .slide-divider {
            opacity: 0.5;
            font-weight: 300;
        }

        .slide-counter .slide-total {
            color: rgba(26, 26, 26, 0.4);
        }

        .transition-overlay {
            position: fixed;
            inset: 0;
            background: #fbf8f2;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .logo-frame { width: min(45vw, 240px); }
            .cover-content { margin-top: 3vh; }
        }

        @media (max-width: 480px) {
            .logo-frame { width: min(50vw, 220px); }
        }

        /* Reduced motion: show all content immediately */
        @media (prefers-reduced-motion: reduce) {
            .cover-name, .cover-tagline, .cover-studio, .cover-jian,
            .logo-frame, .slide-counter {
                opacity: 1 !important;
            }
            .slide:first-child { opacity: 1 !important; }
        }

        /* Noscript fallback */
        noscript .cover-name, noscript .cover-tagline,
        noscript .cover-studio, noscript .cover-jian,
        noscript .logo-frame {
            opacity: 1 !important;
        }
    </style>
</head>

<body>
    <main class="cover">
        <svg class="svg-defs" aria-hidden="true">
            <defs>
                <!--
                    Image clip-path — asymmetric inset to compensate for emboss:
                    Highlight edges (left, top): 0.65 unit inset
                    Shadow edges (right, bottom): 0.95 unit inset
                    Normalized: x/38, y/80
                -->
                <clipPath id="logo-clip-inset" clipPathUnits="objectBoundingBox">
                    <polygon points="0.0171,0.0137 0.2645,0.0778 0.2645,0.9881 0.0171,0.9881" />
                    <polygon points="0.7276,0.3048 0.9750,0.2407 0.9750,0.9881 0.7276,0.9881" />
                </clipPath>

                <linearGradient id="surface-light" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#F4F4F4" />
                    <stop offset="100%" stop-color="#ECECEC" />
                </linearGradient>
            </defs>
        </svg>

        <div class="cover-top">
            <span class="cover-studio">Studio Liminal</span>
            <span class="cover-jian">间</span>
        </div>

        <div class="logo-frame">
            <!--
                Multi-layer emboss effect (like mersi-architecture.com).
                3 levels of shadow + highlight offsets per shape create
                stepped depth. Light source: top-left.
                viewBox 0 0 38 80 matches mark-light.svg.
            -->
            <svg class="logo-emboss" viewBox="0 0 38 80" preserveAspectRatio="none" aria-hidden="true">
                <!--
                    Emboss: per-edge borders with directional lighting.
                    Outer border = shape outset 1 unit along each edge normal.
                    Inner border = at original shape position.
                    Light source: top-left.
                      Light edges (top, left):  rgba(255,255,255, 0.25)
                      Shadow edges (right, bottom): rgba(0,0,0, 0.08)

                    LEFT  original: (0,0)(11,6)(11,80)(0,80)
                    LEFT  outset:   (-1,-1.69)(12,5.41)(12,81)(-1,81)

                    RIGHT original: (27,24)(38,18)(38,80)(27,80)
                    RIGHT outset:   (26,23.41)(39,16.32)(39,81)(26,81)
                -->

                <!-- ═══ LEFT BAR (0,0)(11,6)(11,80)(0,80) ═══ -->

                <!-- Depth shadow -->
                <polygon points="0.4,0.4 11.4,6.4 11.4,80.4 0.4,80.4"
                         fill="rgba(0,0,0,0.03)" />

                <!-- Surface fill -->
                <polygon points="0,0 11,6 11,80 0,80"
                         fill="url(#surface-light)" />

                <!-- Border — light edges (top, left) -->
                <line x1="0" y1="0" x2="11" y2="6"
                      stroke="rgba(255,255,255,0.55)" stroke-width="0.5"/>
                <line x1="0" y1="80" x2="0" y2="0"
                      stroke="rgba(255,255,255,0.50)" stroke-width="0.5"/>
                <!-- Border — shadow edges (right, bottom) -->
                <line x1="11" y1="6" x2="11" y2="80"
                      stroke="rgba(0,0,0,0.22)" stroke-width="0.5"/>
                <line x1="11" y1="80" x2="0" y2="80"
                      stroke="rgba(0,0,0,0.18)" stroke-width="0.5"/>


                <!-- ═══ RIGHT BAR (27,24)(38,18)(38,80)(27,80) ═══ -->

                <!-- Depth shadow -->
                <polygon points="27.4,24.4 38.4,18.4 38.4,80.4 27.4,80.4"
                         fill="rgba(0,0,0,0.03)" />

                <!-- Surface fill -->
                <polygon points="27,24 38,18 38,80 27,80"
                         fill="url(#surface-light)" />

                <!-- Border — light edges (top, left) -->
                <line x1="27" y1="24" x2="38" y2="18"
                      stroke="rgba(255,255,255,0.55)" stroke-width="0.5"/>
                <line x1="27" y1="80" x2="27" y2="24"
                      stroke="rgba(255,255,255,0.50)" stroke-width="0.5"/>
                <!-- Border — shadow edges (right, bottom) -->
                <line x1="38" y1="18" x2="38" y2="80"
                      stroke="rgba(0,0,0,0.22)" stroke-width="0.5"/>
                <line x1="38" y1="80" x2="27" y2="80"
                      stroke="rgba(0,0,0,0.18)" stroke-width="0.5"/>
            </svg>

            <!-- Slideshow — outer .slide is clipped to logo shape;
                 inner .slide-clip animates a curtain inset for the reveal between slides. -->
            <div class="cover-slideshow">
                <div class="slide active">
                    <div class="slide-clip">
                        <picture>
                            <source srcset="images/cover/spira-silva.avif" type="image/avif">
                            <img src="images/cover/spira-silva.jpg" alt="Spira Silva" decoding="async" fetchpriority="high">
                        </picture>
                        <div class="slide-overlay"></div>
                    </div>
                </div>
                <div class="slide">
                    <div class="slide-clip">
                        <picture>
                            <source srcset="images/cover/ripple.avif" type="image/avif">
                            <img src="images/cover/ripple.jpg" alt="The Ripple" decoding="async">
                        </picture>
                        <div class="slide-overlay"></div>
                    </div>
                </div>
                <div class="slide">
                    <div class="slide-clip">
                        <picture>
                            <source srcset="images/cover/loop.avif" type="image/avif">
                            <img src="images/cover/loop.jpg" alt="The Loop" loading="lazy" decoding="async">
                        </picture>
                        <div class="slide-overlay"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="cover-content">
            <span class="cover-name">Yuchen Qiu</span>
            <span class="cover-tagline">Architecture &mdash; Design</span>
        </div>

        <div class="slide-counter" aria-hidden="true">
            <span class="slide-current">01</span>
            <span class="slide-divider">/</span>
            <span class="slide-total">03</span>
        </div>

        <div class="transition-overlay"></div>
    </main>

    <noscript>
        <style>
            .cover-name, .cover-tagline, .cover-studio, .cover-jian,
            .logo-frame, .slide:first-child { opacity: 1 !important; }
        </style>
    </noscript>

    <script src="vendor/gsap/gsap.min.js"></script>
    <script>
        (function () {
            'use strict';

            if (typeof gsap === 'undefined') {
                // GSAP failed to load — show content immediately
                document.querySelectorAll('.cover-name, .cover-tagline, .cover-studio, .cover-jian, .logo-frame, .slide').forEach(
                    el => el.style.opacity = '1'
                );
                return;
            }

            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const slides = document.querySelectorAll('.slide');
            const slideClips = document.querySelectorAll('.slide-clip');
            const slideCounter = document.querySelector('.slide-counter');
            const slideCurrent = document.querySelector('.slide-current');
            const logoFrame = document.querySelector('.logo-frame');
            const coverName = document.querySelector('.cover-name');
            const coverStudio = document.querySelector('.cover-studio');
            const coverJian = document.querySelector('.cover-jian');
            const coverTagline = document.querySelector('.cover-tagline');
            const transitionOverlay = document.querySelector('.transition-overlay');

            let currentSlide = 0;
            const slideDuration = 5;
            const revealDuration = 1.4;
            let slideTimer = null;
            let kenBurnsTween = null;

            function setCounter(idx) {
                if (slideCurrent) slideCurrent.textContent = String(idx + 1).padStart(2, '0');
            }

            function startKenBurns(slideEl) {
                const img = slideEl.querySelector('img');
                if (!img) return;
                const dirs = [
                    { scale: 1.06, xPercent: 1.5, yPercent: -1 },
                    { scale: 1.05, xPercent: -1.5, yPercent: 1 },
                    { scale: 1.06, xPercent: 1, yPercent: 1.5 },
                    { scale: 1.05, xPercent: -1, yPercent: -1.5 }
                ];
                gsap.set(img, { scale: 1, xPercent: 0, yPercent: 0 });
                kenBurnsTween = gsap.to(img, {
                    ...dirs[currentSlide % dirs.length],
                    duration: slideDuration + 1,
                    ease: 'none'
                });
            }

            // Curtain-rise reveal: new slide's inner .slide-clip animates from
            // inset(100% 0 0 0) (fully clipped) to inset(0) (fully visible),
            // revealing the image from bottom-up within the logo shape.
            function goToSlide(index) {
                if (index === currentSlide) return;
                if (kenBurnsTween) kenBurnsTween.kill();

                const oldSlide = slides[currentSlide];
                const newSlide = slides[index];
                const newClip = newSlide.querySelector('.slide-clip');

                // New slide becomes visible (full opacity), clip starts hidden
                gsap.set(newSlide, { opacity: 1 });
                gsap.set(newClip, { clipPath: 'inset(100% 0 0 0)' });
                gsap.to(newClip, {
                    clipPath: 'inset(0% 0 0 0)',
                    duration: revealDuration,
                    ease: 'power3.inOut'
                });
                // Old slide fades out behind the rising curtain
                gsap.to(oldSlide, {
                    opacity: 0,
                    duration: revealDuration * 0.6,
                    delay: revealDuration * 0.5,
                    ease: 'power2.inOut',
                    onComplete: () => {
                        // Reset old slide's curtain so it can re-enter cleanly
                        const oc = oldSlide.querySelector('.slide-clip');
                        if (oc) gsap.set(oc, { clipPath: 'inset(0)' });
                    }
                });

                currentSlide = index;
                startKenBurns(newSlide);
                setCounter(index);
            }

            function nextSlide() {
                goToSlide((currentSlide + 1) % slides.length);
            }

            function startSlideshow() {
                startKenBurns(slides[0]);
                setCounter(0);
                slideTimer = setInterval(nextSlide, slideDuration * 1000);
            }

            function playLoadAnimation() {
                if (prefersReducedMotion) {
                    gsap.set([coverName, coverStudio, coverJian, coverTagline, slideCounter], { opacity: 1 });
                    gsap.set(logoFrame, { scale: 1, opacity: 1 });
                    startSlideshow();
                    return;
                }

                gsap.set(logoFrame, { scale: 0.98, opacity: 1 });
                gsap.set(slides[0], { opacity: 1 });
                gsap.set(coverStudio, { y: -6, opacity: 1 });
                gsap.set(coverJian, { y: -4, opacity: 1 });
                gsap.set(coverName, { y: 8, opacity: 1 });
                gsap.set(coverTagline, { y: 5, opacity: 1 });
                gsap.set(slideCounter, { opacity: 1, y: 4 });
                const tl = gsap.timeline({ onComplete: () => startSlideshow() });
                tl.to(coverStudio, { y: 0, duration: 0.5, ease: 'power3.out' })
                  .to(coverJian, { y: 0, duration: 0.35, ease: 'power3.out' }, '-=0.25')
                  .to(logoFrame, { scale: 1, duration: 0.8, ease: 'power3.out' }, '-=0.2')
                  .to(coverName, { y: 0, duration: 0.5, ease: 'power3.out' }, '-=0.35')
                  .to(coverTagline, { y: 0, duration: 0.35, ease: 'power3.out' }, '-=0.25')
                  .to(slideCounter, { y: 0, duration: 0.4, ease: 'power3.out' }, '-=0.2');
            }

            function initMouseParallax() {
                if (prefersReducedMotion) return;
                if ('ontouchstart' in window || navigator.maxTouchPoints > 0) return;

                let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
                const imgs = document.querySelectorAll('.slide img');

                document.addEventListener('mousemove', (e) => {
                    targetX = (e.clientX / window.innerWidth - 0.5) * 5;
                    targetY = (e.clientY / window.innerHeight - 0.5) * 3;
                });
                gsap.ticker.add(() => {
                    currentX += (targetX - currentX) * 0.06;
                    currentY += (targetY - currentY) * 0.06;
                    imgs.forEach(img => {
                        gsap.set(img, { x: currentX, y: currentY });
                    });
                });
            }

            /* ── Shared exit transition ──
               Modern browsers (Chrome 126+, Safari 18.2+) use cross-document
               View Transitions to morph the embossed logo into the home header.
               Older browsers fall back to the GSAP zoom + crossfade. */
            let isExiting = false;
            const targetHref = 'home.html';
            const supportsCrossDocVT = (
                'startViewTransition' in document &&
                CSS.supports('view-transition-name', 'site-logo')
            );

            function playExitAnimation() {
                if (isExiting) return;
                isExiting = true;
                clearInterval(slideTimer);

                // Modern browsers: skip the GSAP zoom — let the browser morph
                // .logo-emboss into home's .logo img via cross-document VT.
                if (supportsCrossDocVT) {
                    window.location.href = targetHref;
                    return;
                }

                if (prefersReducedMotion) {
                    window.location.href = targetHref;
                    return;
                }

                const tl = gsap.timeline({ onComplete: () => { window.location.href = targetHref; } });
                tl.to([coverName, coverStudio, coverJian, coverTagline, slideCounter], {
                    opacity: 0, y: -15, duration: 0.35, ease: 'power2.in', stagger: 0.04
                })
                .to(logoFrame, {
                    scale: 4, y: '-20vh', duration: 1.1, ease: 'power3.in'
                }, '-=0.15')
                .to(transitionOverlay, {
                    opacity: 1, duration: 0.45, ease: 'power2.in'
                }, '-=0.45');
            }

            /* Enter button click */
            /* ── Scroll / swipe down to enter ── */
            let wheelAccum = 0;
            const wheelThreshold = 80;

            document.addEventListener('wheel', function (e) {
                if (isExiting) return;
                if (e.deltaY > 0) {
                    wheelAccum += e.deltaY;
                    if (wheelAccum >= wheelThreshold) {
                        playExitAnimation();
                    }
                } else {
                    wheelAccum = 0;
                }
            }, { passive: true });

            /* Touch swipe down */
            let touchStartY = 0;
            document.addEventListener('touchstart', function (e) {
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            document.addEventListener('touchend', function (e) {
                if (isExiting) return;
                const deltaY = touchStartY - e.changedTouches[0].clientY;
                if (deltaY > 60) {
                    playExitAnimation();
                }
            }, { passive: true });

            playLoadAnimation();
            initMouseParallax();
        })();
    </script>
</body>

</html>
